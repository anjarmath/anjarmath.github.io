<html>
	<body>
  <div id="login">
  <div id="bar">
	<center>
	  <br/>
	  <h2 style="color:black; margin 0px; font-family: 'Playfair';"><b>Sertifikat OPCN 2020<b></h2>
	  <font color="white"><b>Lomba Cipta Opini, Puisi, dan Cerpen Mahasiswa Penerima Bidikmisi Tingkat Nasional Tahun 2020</font>
	  <br/><br/>
	  </center>
	</div>
	<div style="margin: 5% 10% 10% 10%;">
		<font size="1dp"><i>
		<div id="err" style="background:#c8f0c8;text-align:center;padding:3px;color:red; border-radius:4px;font-weight:200;"><font color="green">masukkan data dengan benar</font></div><br/></i></font>
	  
		<div style="height:30px;"><input type="text" id="label" disabled name="label" value="u"/><input type="integer" id="nim" placeholder="Nomor Induk Mahasiswa (NIM)"/></div><br/><br/>
	  <br/></font>
	<center>
	  <br/>
	  <input type="button" value="SUBMIT" onclick="mulai();" class="submit"/>
	</div>
	</div>
	</body>
	
	
<style>
	#login{
		border:1px solid #d3d3d3;
		display:block; 
		background: #eee; 
		border-radius:7px; 
		margin:10%;
		font-size:2dp; 
		font-family:calibri;}
	#bar{
		border-bottom: 1px solid #ccc;
		background: red;
		border-radius:7px 7px 0px 0px; 
		width: 100%;}
	#label{
		background: red;
		color: white;
		width: 10%;
		height: 100%;
		outline: none;
		border-radius: 4px 0px 0px 4px;
		text-align: center;
		border: 1px solid red;
		border-top: 2px solid red;
		font-weight:400;
		font-family: 'Fonticon';}
	#nim{
		outline:none;
		background:white;
		border:1px solid red;
		border-bottom: 2px solid red;
		border-radius: 0px 4px 4px 0px;
		height:100%; width:90%;
		font-weight:400;}
	#mulai{
		display:none;
		margin:1px; 
		border-radius:10px; 
		background:white; 
		padding:5px; 
		padding-top:0px;
		padding-left:0px;
		border:1px solid #d3d3d3;}
	.submit{
		color:white;
		font-weight:900;
		background:red; 
		border:none;
		border-radius:40px; 
		width:100%;
		height:30px;
		outline:none;
		-webkit-transition: all .12s ease;
		-moz-transition: all .7s ease;
		-o-transition: all .7s ease;  
		transition: all .7s ease;}
	.submit:active{
		background:#9e4a4a;
		color: white;}
		
	@font-face {
		font-family: 'Fonticon';
		src: url('fonts/fontomas-webfont.ttf');}
	@font-face {
		font-family: 'Playfair';
		src: url('fonts/PlayfairDisplay-Bold.otf');
		}
</style>
<script src="script.js"></script>
</html>
